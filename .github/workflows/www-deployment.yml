name: WWW Deployment

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/www-deployment.yml"
  workflow_dispatch:

concurrency:
  group: www-deployment
  cancel-in-progress: true

jobs:
  build-and-notify:
    name: Build web and notify www deployment
    runs-on: ubuntu-latest

    environment: main-branch

    env:
      ARTIFACT_NAME: pldz-dev-site-web-dist
      SERVER_NOTICE_URL: ${{ secrets.SERVER_NOTICE_URL }}
      SERVER_DEPLOY_TOKEN: ${{ secrets.SERVER_DEPLOY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload dist artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: web/dist
          if-no-files-found: error

      - name: Notify target server
        if: env.SERVER_NOTICE_URL != '' && env.SERVER_DEPLOY_TOKEN != ''
        run: |
          curl -f -X POST "$SERVER_NOTICE_URL" \
            -H "X-Deploy-Token: ${SERVER_DEPLOY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "folder": "web",
              "artifact_url": "${{ steps.upload.outputs.artifact-url }}"
            }'
