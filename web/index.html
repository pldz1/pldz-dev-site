<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>爬楼的猪 Dev</title>

    <script>
      (() => {
        const allowedThemes = new Set(["light", "lime", "brown"]);
        const legacyThemeMap = { gemini: "light", gpt: "lime", claude: "brown" };
        let theme = "light";

        try {
          const storedTheme = window.localStorage.getItem("pldz-dev-theme");
          if (allowedThemes.has(storedTheme)) theme = storedTheme;
          else if (legacyThemeMap[storedTheme]) theme = legacyThemeMap[storedTheme];
        } catch (_error) {}

        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <style>
      #loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #f3f6f7;
      }
      #loading > div {
        width: min(80vw, 400px);
        text-align: center;
      }
      #text {
        margin: 0 0 12px;
        font: 20px system-ui, sans-serif;
        color: #333;
      }
      #track {
        height: 12px;
        background: #fff;
        border-radius: 999px;
        overflow: hidden;
      }
      #bar {
        width: 0;
        height: 100%;
        background: linear-gradient(90deg, #ff6f91, #ffc75f, #f9f871);
        transition: width 0.2s ease;
      }
    </style>
  </head>

  <body>
    <!-- loading -->
    <div id="loading">
      <div>
        <div id="text">🚀 Loading 0%</div>
        <div id="track"><div id="bar"></div></div>
      </div>
    </div>

    <!-- app -->
    <div id="app"></div>

    <script>
      (() => {
        const bar = document.getElementById("bar");
        const text = document.getElementById("text");
        let p = 0;

        const set = (n) => {
          p = Math.max(0, Math.min(100, n));
          bar.style.width = p + "%";
          text.textContent = `🚀 Loading ${p}%`;
        };

        const timer = setInterval(() => {
          if (p < 95) set(p + 1);
          else clearInterval(timer);
        }, 60);

        window.loading = {
          set,
          done() {
            clearInterval(timer);
            set(100);
            document.getElementById("loading")?.remove();
          },
        };
      })();
    </script>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
